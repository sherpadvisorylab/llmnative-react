name: Deploy showcase to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install showcase deps
        run: npm ci
        working-directory: clients/showcase

      - name: Build showcase
        run: npm run build
        working-directory: clients/showcase
        env:
          VITE_BASE_PATH: /llmnative-react/

      - name: SPA fallback for GH Pages
        run: cp clients/showcase/dist/index.html clients/showcase/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: clients/showcase/dist

      - uses: actions/deploy-pages@v4
        id: deployment
